{% extends "layout.html" %}

{% block container %}
{% import "_macros.html" as macros %}
<form class="max-w-md mx-auto" action="/AgregarCurso" method="POST">
    {{ form.csrf_token }}
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="relative z-0 w-full mb-5 group">
      <input type="nombre" name="nombre" id="nombre" class="block py-2.5 px-0 w-full text-sm text-heading bg-transparent border-0 border-b-2 border-default-medium appearance-none focus:outline-none focus:ring-0 focus:border-brand peer" placeholder=" " required />
      <label for="nombre" class="absolute text-sm text-body duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-focus:start-0 peer-focus:text-fg-brand peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto">nombre del Curso</label>
  </div>
  
<label for="descripcion" class="block mb-2.5 text-sm font-medium text-heading">Descripcion del curso</label>
<textarea name="descripcion" id="descripcion" rows="4" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-3.5 shadow-xs placeholder:text-body" placeholder="Escribe la descripcion del curso"></textarea>

  <label for="maestros" class="block mb-2.5 text-sm font-medium text-heading">Selecciona a un maestro</label>
  <select name="maestro" id="maestros" class="block w-full px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body">
    {% for value, text in form.maestro.choices %}
        <option value="{{ value }}">{{ text }}</option>
    {% endfor %}
  </select>
 <br>
  <button type="submit" class="text-success bg-neutral-primary border border-success hover:bg-success hover:text-white focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">Guardar</button>

<a type="button" href="/ListadoCursos" class="text-danger bg-neutral-primary border border-danger hover:bg-danger hover:text-white focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">Cancelar</a>

</form>
{%endblock%}
